name: CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**/*.py'
      - 'backend/requirements.txt'
      - 'backend/static/**'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'docs/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**/*.py'
      - 'backend/requirements.txt'
      - 'backend/static/**'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'docs/**'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  code-check:
    name: Code Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt flake8

      - name: Get changed Python files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}...HEAD"
          else
            BASE="HEAD~1...HEAD"
          fi
          FILES=$(git diff --name-only --diff-filter=ACMRT "$BASE" -- '*.py' 'backend/**/*.py' 2>/dev/null || find backend -name '*.py' -print)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Syntax check
        run: |
          FILES="${{ steps.changed.outputs.files }}"
          if [ -n "$FILES" ]; then
            for f in $FILES; do
              if [ -f "$f" ]; then
                python -m py_compile "$f" || exit 1
              fi
            done
          fi

      - name: Flake8 (critical errors only)
        run: |
          FILES="${{ steps.changed.outputs.files }}"
          if [ -n "$FILES" ]; then
            flake8 --select=E9,F63,F7,F82 $FILES || exit 1
          fi

      - name: Module import test
        run: |
          cd backend
          python -c "from main import app"

      - name: Static frontend assets exist
        run: |
          test -f backend/static/index.html
          test -f backend/static/app.js
          test -f backend/static/styles.css

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: code-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t chatraw-hermes-api-server:test .

      - name: Smoke test
        run: docker run --rm chatraw-hermes-api-server:test python -c "print('Docker OK')"
